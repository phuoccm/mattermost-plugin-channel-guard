name: PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Accepted prefixes. Matches the project's commit-style memory:
          # subject is imperative, no trailing period, scope optional.
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            revert
          requireScope: false
          # If a scope is provided, restrict it to the actual code areas.
          # deps / deps-dev are emitted by Dependabot PRs (production vs
          # development dependencies) — must be allowed or Dependabot PRs
          # fail title validation.
          scopes: |
            server
            webapp
            admin
            command
            http
            ci
            build
            deps
            deps-dev
            release
            docs
